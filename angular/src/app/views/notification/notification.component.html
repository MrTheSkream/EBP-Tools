<main [class.left_rounded]="data.leftRounded">
  @if (images.length == 0) {
    <div class="loader">
      <ebp-loader
        [value]="data.percent"
        [infinite]="data.infinite"
        [icon]="data.icon"
      ></ebp-loader>
    </div>
    <ebp-message [html]="data.text"> </ebp-message>
  } @else {
    <div class="images">
      <ebp-message [html]="data.text"> </ebp-message>
      <div>
        @for (image of images; track image) {
          <img [src]="image" />
        }
      </div>
    </div>
  }
</main>

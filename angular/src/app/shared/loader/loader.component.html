<div
  [class]="state + ' loader t' + value"
  id="loader"
  [class.infinite]="infinite"
>
  @if (!infinite && !icon) {
    <span></span>
  }
  @if (icon) {
    <i [class]="icon"></i>
  }
  <div>
    @for (i of [].constructor(50); track $index) {
      <div></div>
    }
  </div>
</div>

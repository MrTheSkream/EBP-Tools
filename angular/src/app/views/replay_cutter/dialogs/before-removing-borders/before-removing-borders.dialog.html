<h2 mat-dialog-title>
  {{ 'view.replay_cutter.dialog.before-removing-borders.title' | translate }}
  <button
    class="squared"
    mat-dialog-close
    matTooltip="{{ 'common.close' | translate }}"
  >
    <i class="fa-sharp fa-solid fa-xmark"></i>
  </button>
</h2>
<mat-dialog-content>
  <ebp-row>
    <ebp-column
      [xs]="12"
      innerHTML="{{ 'view.replay_cutter.dialog.before-removing-borders.description' | translate }}"
    ></ebp-column>
  </ebp-row>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-dialog-close>
    <i class="fa-sharp fa-solid fa-xmark"></i>{{ 'common.cancel' | translate }}
  </button>
  <button class="ml-2 green" [mat-dialog-close]="true">
    <i class="fa-sharp fa-solid fa-check"></i>{{ 'common.ok' | translate }}
  </button>
</mat-dialog-actions>
